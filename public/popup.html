<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      height: 290px;
      margin: 0;
      padding: 1.5rem;
      background: #05070a;
      color: #e0e6ed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
      overflow: hidden;
      border: 1px solid rgba(0, 242, 254, 0.15);
      border-radius: 8px;
    }

    /* Header styling */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }

    .logo {
      font-size: 0.95rem;
      font-weight: 700;
      color: #39ff14;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .version {
      color: #5f6e80;
    }

    .upgrade-link {
      display: flex;
      align-items: center;
      gap: 3px;
      color: #00f2fe;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.75rem;
    }

    .upgrade-link:hover {
      text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
    }

    /* Main metrics container */
    .metric-container {
      text-align: center;
      margin: 1.5rem 0;
    }

    .count {
      font-size: 4.8rem;
      font-weight: 800;
      color: #00f2fe;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 30px rgba(0, 242, 254, 0.35);
      margin-bottom: 0.25rem;
    }

    .label {
      font-size: 0.85rem;
      color: #8fa0b5;
      font-weight: 500;
    }

    /* Options / check row */
    .links-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #5f6e80;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.75rem;
    }

    .links-row a {
      color: #5f6e80;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .links-row a:hover {
      color: #8fa0b5;
    }

    /* Footer styling */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: #8fa0b5;
      padding-top: 0.5rem;
    }

    .footer-link {
      color: #00f2fe;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Top Header -->
  <div class="header">
    <div class="logo">// PromptShield.ai</div>
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <span class="version">v1.0.3</span>
      <a href="#" class="upgrade-link">✦ Upgrade</a>
    </div>
  </div>

  <!-- Center Counter Display -->
  <div class="metric-container">
    <div class="count" id="intercepted-count">33</div>
    <div class="label">secrets intercepted</div>
  </div>

  <!-- Audit Status & Update Triggers -->
  <div class="links-row">
    <a href="#">Detection patterns v9</a>
    <a href="#" id="update-btn">⟳ Check for updates</a>
  </div>

  <!-- Footer block -->
  <div class="footer">
    <div>Evaluated locally</div>
    <a href="https://github.com" target="_blank" class="footer-link">Source code ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
